<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  background:#f4efe8;
}

.scene{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#f4efe8;
}

.base{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  animation: slowZoom 8s ease-in-out forwards;
}

.fabric-motion{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;

  clip-path: inset(58% 30% 20% 30%);

  animation: shirtFlutter 1.4s ease-in-out infinite;
  opacity:.85;
  filter: blur(.4px);
}

@keyframes slowZoom{
  0%{ transform:scale(1); }
  100%{ transform:scale(1.025); }
}

@keyframes shirtFlutter{
  0%{ transform:translateX(0px) skewX(0deg); }

  35%{ transform:translateX(-4px) skewX(-1.5deg); }

  70%{ transform:translateX(3px) skewX(1deg); }

  100%{ transform:translateX(0px) skewX(0deg); }
}
</style>
</head>

<body>

<div class="scene">
  <img class="base" src="./shirt-door.PNG">
  <img class="fabric-motion" src="./shirt-door.PNG">
</div>

</body>
</html>
