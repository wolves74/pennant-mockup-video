<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pennant Mockup Video</title>

<style>

body{
  margin:0;
  overflow:hidden;
  background:#f3efe8;
}

.scene{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* BACKGROUND */

.background{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;

  animation:
  slowZoom 8s ease-in-out forwards;
}

/* MOVING PENNANT */

.pennant{
  position:absolute;

  top:17%;
  left:36%;

  width:33%;

  animation:
  placePennant 6s ease forwards;
}

/* CAMERA ZOOM */

@keyframes slowZoom{

  0%{
    transform:scale(1);
  }

  100%{
    transform:scale(1.04);
  }
}

/* PENNANT MOTION */

@keyframes placePennant{

  0%{
    transform:
    translateX(-120px)
    translateY(-40px)
    rotate(-8deg);

    opacity:0;
  }

  35%{
    opacity:1;
  }

  70%{
    transform:
    translateX(0px)
    translateY(0px)
    rotate(1deg);
  }

  100%{
    transform:
    translateX(0px)
    translateY(0px)
    rotate(0deg);
  }
}

</style>
</head>

<body>

<div class="scene">

<img
class="background"
src="background.png">

<img
class="pennant"
src="Pennant.png">

</div>

</body>
</html>
