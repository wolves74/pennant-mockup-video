<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pennant Mockup Video</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#f3efe8;
}

.scene{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#f3efe8;
}

.background{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  animation: slowZoom 8s ease-in-out forwards;
}

.pennant{
  position:absolute;
  top:18.5%;
  left:36.8%;
  width:34%;
  transform-origin:left center;
  animation: placePennant 8s ease-in-out forwards;
  filter: drop-shadow(0px 8px 10px rgba(0,0,0,0.18));
}

@keyframes slowZoom{
  0%{ transform:scale(1); }
  100%{ transform:scale(1.035); }
}

@keyframes placePennant{
  0%{
    transform: translateX(-210px) translateY(70px) rotate(-10deg) scale(0.98);
    opacity:0;
  }

  20%{ opacity:1; }

  55%{
    transform: translateX(-18px) translateY(8px) rotate(-2deg) scale(1);
  }

  72%{
    transform: translateX(2px) translateY(-2px) rotate(0.8deg) scale(1);
  }

  86%{
    transform: translateX(0px) translateY(0px) rotate(-0.3deg) scale(1);
  }

  100%{
    transform: translateX(0px) translateY(0px) rotate(0deg) scale(1);
  }
}
</style>
</head>

<body>

<div class="scene">
  <img class="background" src="background-pennant.png" alt="background">
  <img class="pennant" src="pennant-only.png" alt="pennant">
</div>

</body>
</html>
